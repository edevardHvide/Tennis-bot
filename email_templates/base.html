<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="color-scheme" content="light">
    <meta name="supported-color-schemes" content="light">
    <title>{% block title %}Tennis Court Notification{% endblock %}</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style>
        :root { color-scheme: light !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px;
            line-height: 1.6;
            color: #1e293b;
            background-color: #07101e;
            margin: 0;
            padding: 0;
            width: 100% !important;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        table {
            border-collapse: collapse;
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img { border: 0; outline: none; text-decoration: none; max-width: 100%; height: auto; }

        a { color: #0ea5e9; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .email-wrapper {
            width: 100%;
            background-color: #07101e;
            background-image:
                radial-gradient(ellipse 120% 75% at 50% 45%, rgba(160,50,15,0.22) 0%, transparent 60%),
                url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 800'><rect width='1200' height='800' fill='%2307101e'/><rect x='150' y='100' width='900' height='600' fill='none' stroke='white' stroke-width='2' opacity='.07'/><line x1='262' y1='100' x2='262' y2='700' stroke='white' stroke-width='1.5' opacity='.04'/><line x1='938' y1='100' x2='938' y2='700' stroke='white' stroke-width='1.5' opacity='.04'/><line x1='262' y1='238' x2='938' y2='238' stroke='white' stroke-width='1.5' opacity='.04'/><line x1='262' y1='562' x2='938' y2='562' stroke='white' stroke-width='1.5' opacity='.04'/><line x1='600' y1='238' x2='600' y2='562' stroke='white' stroke-width='1.5' opacity='.04'/><line x1='147' y1='400' x2='1053' y2='400' stroke='white' stroke-width='2.5' opacity='.09'/></svg>");
            background-size: cover;
            background-position: center;
            padding: 44px 0 52px;
        }

        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff !important;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(5,2,0,0.45), 0 3px 10px rgba(5,2,0,0.2);
            border: 1px solid rgba(210,180,160,0.2);
        }

        /* Header */
        .header {
            background-color: #050d1f;
            background-image: linear-gradient(135deg, #050d1f 0%, #0c1e3e 55%, #0a2a1a 100%);
            padding: 40px 44px 36px;
        }

        .header-badge {
            display: inline-block;
            background: linear-gradient(135deg, #00c96b, #10b981);
            color: #ffffff;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 100px;
            margin-bottom: 18px;
            box-shadow: 0 0 0 1px rgba(0,201,107,0.3), 0 4px 12px rgba(0,201,107,0.25);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .header .subtitle {
            font-size: 14px;
            color: #64c8a0;
            font-weight: 500;
        }

        /* Content */
        .content {
            padding: 36px 44px 40px;
            background-color: #ffffff !important;
            color: #1e293b !important;
        }

        .content-lead {
            font-size: 15px;
            color: #475569 !important;
            margin-bottom: 28px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f1f5f9;
            line-height: 1.7;
        }

        .content-lead strong { color: #0f172a !important; font-weight: 700; }

        /* Facility card */
        .facility-section {
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(15,23,42,0.05);
        }

        .facility-header {
            background: linear-gradient(90deg, #f8fafc 0%, #f1f5f9 100%) !important;
            padding: 14px 20px;
            border-bottom: 1px solid #e2e8f0;
        }

        .facility-title {
            font-size: 14px;
            font-weight: 700;
            color: #0f172a !important;
            letter-spacing: -0.01em;
        }

        .facility-body { padding: 4px 20px 18px; background-color: #ffffff !important; }

        /* Date group */
        .date-group { margin-top: 16px; }

        .date-label {
            font-size: 11px;
            font-weight: 700;
            color: #94a3b8 !important;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #f1f5f9;
        }

        /* Slot row */
        .slot-row {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f8fafc;
        }

        .slot-row:last-child { border-bottom: none; }

        .slot-time {
            font-size: 12px;
            font-weight: 700;
            color: #334155 !important;
            background: linear-gradient(135deg, #f1f5f9, #e8edf5) !important;
            border: 1px solid #dde3ec;
            border-radius: 6px;
            padding: 5px 10px;
            min-width: 88px;
            text-align: center;
            margin-right: 12px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .slot-time-lg { min-width: 120px; }

        .slot-courts {
            flex: 1;
            font-size: 13px;
            color: #334155;
            line-height: 2;
        }

        /* Court tags */
        .court-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 6px;
            margin: 2px 3px 2px 0;
            border: 1px solid transparent;
            letter-spacing: 0.01em;
        }

        .court-tag.new {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            color: #14532d;
            border-color: #86efac;
            box-shadow: 0 0 0 2px rgba(134,239,172,0.3);
            font-weight: 700;
        }

        .court-tag.clay {
            background: linear-gradient(135deg, #ffedd5, #fed7aa);
            color: #7c2d12;
            border-color: #fb923c;
        }

        .court-tag.hard {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #1e3a8a;
            border-color: #60a5fa;
        }

        .court-tag.standard {
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            color: #334155;
            border-color: #cbd5e1;
        }

        /* CTA */
        .cta-wrap {
            padding: 18px 20px 4px;
            text-align: center;
        }

        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #00c96b 0%, #059652 100%) !important;
            color: #ffffff !important;
            text-decoration: none !important;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.03em;
            padding: 12px 28px;
            border-radius: 8px;
            box-shadow: 0 4px 14px rgba(0,150,82,0.4);
        }

        .cta-button:hover {
            background: linear-gradient(135deg, #00b85f 0%, #047a43 100%) !important;
            text-decoration: none !important;
        }

        /* Info / warning boxes */
        .info-box {
            background: linear-gradient(135deg, #f0fdf4, #dcfce7);
            border: 1px solid #86efac;
            border-radius: 10px;
            padding: 14px 18px;
            margin: 24px 0;
            font-size: 13px;
            color: #166534;
        }

        .warning-box {
            background: linear-gradient(135deg, #fefce8, #fef9c3);
            border: 1px solid #fde68a;
            border-radius: 10px;
            padding: 14px 18px;
            margin: 24px 0;
            font-size: 13px;
            color: #713f12;
        }

        /* Quote */
        .quote-block {
            border-left: 3px solid #00c96b;
            padding: 12px 18px;
            margin: 24px 0;
            background: linear-gradient(90deg, #f0fdf4, #f8fafc);
            border-radius: 0 8px 8px 0;
        }

        .quote-block p {
            font-size: 14px;
            color: #475569;
            font-style: italic;
            margin: 0;
            line-height: 1.7;
        }

        /* Stats table */
        .stats-table {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 1px 4px rgba(15,23,42,0.04);
        }

        .stats-table td {
            padding: 13px 18px;
            font-size: 14px;
            border-bottom: 1px solid #f1f5f9;
            color: #334155;
        }

        .stats-table tr:nth-child(even) td { background-color: #fafbfc; }
        .stats-table td:first-child { color: #64748b; width: 55%; }
        .stats-table td:last-child { font-weight: 700; color: #0f172a; text-align: right; }
        .stats-table tr:last-child td { border-bottom: none; }

        /* Section heading */
        .section-heading {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #94a3b8;
            margin-bottom: 14px;
            margin-top: 28px;
        }

        /* Footer */
        .footer {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9) !important;
            border-top: 1px solid #e2e8f0;
            padding: 24px 44px;
            font-size: 12px;
            color: #94a3b8 !important;
            line-height: 1.8;
            text-align: center;
        }

        .footer a { color: #64748b !important; }
        .footer a:hover { color: #334155 !important; }

        /* Responsive */
        @media only screen and (max-width: 640px) {
            .email-wrapper { padding: 0; }
            .email-container { border-radius: 0; border-left: none; border-right: none; box-shadow: none; }
            .header { padding: 30px 24px 26px; }
            .content { padding: 28px 24px 32px; }
            .footer { padding: 20px 24px; }
            .cta-wrap { padding: 14px 0 0; }
            .slot-row { flex-direction: column; align-items: flex-start; }
            .slot-time { margin-right: 0; margin-bottom: 6px; }
        }
    </style>
</head>
<body>
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
        <tr>
            <td class="email-wrapper">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" align="center" bgcolor="#ffffff" class="email-container" style="max-width:600px; background-color:#ffffff !important;">

                    <!-- Header -->
                    <tr>
                        <td class="header">
                            <div class="header-badge">Matchi Bot</div>
                            <h1>{% block header_title %}Tennis Court Availability{% endblock %}</h1>
                            <div class="subtitle">{% block header_subtitle %}Matchi Availability Monitor{% endblock %}</div>
                        </td>
                    </tr>

                    <!-- Body -->
                    <tr>
                        <td class="content" bgcolor="#ffffff" style="background-color:#ffffff !important; padding:36px 44px 40px; color:#1e293b !important;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td class="footer" bgcolor="#f1f5f9" style="background-color:#f1f5f9 !important;">
                            <p>
                                <strong style="color:#475569;">Matchi Availability Bot</strong><br>
                                Monitoring tennis courts so you don't have to &mdash; {{ timestamp }}<br>
                                <a href="https://github.com/edevardHvide/Tennis-bot">View on GitHub</a>
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
